<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Tradutor Voz → Libras</title>

<style>

body{
background: linear-gradient(135deg,#5b4d9d,#7aa8ff);
color:white;
font-family:Arial;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
text-align:center;
}

button{
margin-top:30px;
padding:16px 40px;
font-size:20px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#c6b7ff,#9fd2ff);
color:#2b2b2b;
font-weight:bold;
cursor:pointer;
}

#legenda{
position:fixed;
bottom:40px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.8);
padding:14px 28px;
border-radius:14px;
font-size:22px;
max-width:70%;
line-height:1.4;
text-align:center;

opacity:0;
transition:opacity 0.3s ease;
}

#legenda.show{
opacity:1;
}

</style>
</head>

<body>

<h1>🎤 Voz para Libras</h1>
<p>Fale normalmente.</p>

<button id="start">Iniciar Microfone</button>

<div id="legenda"></div>

<!-- VLibras -->
<div vw class="enabled">
<div vw-access-button class="active"></div>
<div vw-plugin-wrapper>
<div class="vw-plugin-top-wrapper"></div>
</div>
</div>

<script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>

<script>

new window.VLibras.Widget('https://vlibras.gov.br/app');

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

const recognition = new SpeechRecognition();

recognition.lang = "pt-BR";
recognition.continuous = true;
recognition.interimResults = true;

let textoFixo = "";   // o que já foi confirmado
let timeoutLegenda;

document.getElementById("start").onclick = () => {
recognition.start();
}

recognition.onresult = (event) => {

let parcial = "";

for(let i = event.resultIndex; i < event.results.length; i++){

let transcript = event.results[i][0].transcript;

if(event.results[i].isFinal){

/* adiciona ao texto fixo (não perde mais) */
textoFixo += transcript + " ";

}else{

parcial = transcript;

}

}

/* junta fixo + parcial */
let textoAtual = textoFixo + parcial;

/* limita tamanho (tipo legenda real) */
if(textoAtual.length > 120){
textoFixo = textoAtual.slice(-80);
textoAtual = textoFixo;
}

/* mostra legenda */
mostrarLegenda(textoAtual, parcial === "");

}

function mostrarLegenda(texto, terminouFrase){

const legenda = document.getElementById("legenda");

legenda.innerText = texto;
legenda.classList.add("show");

/* enquanto está falando → não some */
if(!terminouFrase){
clearTimeout(timeoutLegenda);
return;
}

/* terminou → começa sumir */
clearTimeout(timeoutLegenda);

timeoutLegenda = setTimeout(()=>{
legenda.classList.remove("show");
textoFixo = ""; // limpa depois que some
},2500);

}

recognition.onend = ()=>{
recognition.start();
}

</script>

</body>
</html>
