<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Tradutor Voz → Libras Automático</title>

<style>
body{
    background: linear-gradient(135deg,#5b4d9d,#7aa8ff);
    color:white;
    font-family:Arial;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
    margin:0;
    text-align:center;
}

button{
    margin-top:30px;
    padding:16px 40px;
    font-size:20px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#c6b7ff,#9fd2ff);
    color:#2b2b2b;
    font-weight:bold;
    cursor:pointer;
}

#legenda{
    position:fixed;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(0,0,0,0.85);
    padding:16px 30px;
    border-radius:14px;
    font-size:22px;
    max-width:70%;
    text-align:center;
    line-height:1.4;
    opacity:0;
    transition:opacity 0.3s ease;
}
#legenda.show{
    opacity:1;
}
</style>
</head>

<body>

<h1>🎤 Voz para Libras Automático</h1>
<p>Fale normalmente.</p>

<button id="start">Iniciar Microfone</button>

<div id="legenda"></div>

<!-- VLibras -->
<div vw class="enabled">
  <div vw-access-button class="active"></div>
  <div vw-plugin-wrapper>
    <div class="vw-plugin-top-wrapper"></div>
  </div>
</div>

<script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>

<script>
new window.VLibras.Widget('https://vlibras.gov.br/app');

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();
recognition.lang = "pt-BR";
recognition.continuous = true;
recognition.interimResults = false; // 🔥 essencial

let timeoutLegenda;

document.getElementById("start").onclick = () => {
    recognition.start();
}

recognition.onresult = (event) => {
    for(let i = event.resultIndex; i < event.results.length; i++){
        if(event.results[i].isFinal){
            let frase = event.results[i][0].transcript.trim();
            if(frase.length > 0){
                mostrarLegenda(frase);
            }
        }
    }
}

function mostrarLegenda(texto){
    const legenda = document.getElementById("legenda");

    // quebra simples em 2 linhas
    if(texto.length > 60){
        let meio = Math.floor(texto.length / 2);
        let quebra = texto.lastIndexOf(" ", meio);
        if(quebra !== -1){
            texto = texto.slice(0, quebra) + "\n" + texto.slice(quebra + 1);
        }
    }

    legenda.innerText = texto;
    legenda.classList.add("show");

    clearTimeout(timeoutLegenda);
    timeoutLegenda = setTimeout(()=>{
        legenda.classList.remove("show");
    },3500);

    // 🔥 dispara clique automático para o VLibras
    legenda.click();
}

recognition.onend = () => {
    recognition.start(); // reinicia automaticamente
}

recognition.onerror = (event) => {
    console.error("Erro:", event.error);
    if(event.error === "not-allowed"){
        alert("Permissão do microfone negada!");
    }
}
</script>

</body>
</html>
