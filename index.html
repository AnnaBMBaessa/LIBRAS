<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Voz → Libras</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:flex-start;
    padding-left:80px;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e3a8a);
}

/* CONTAINER */
.container{
    display:flex;
    align-items:center;
    gap:40px;
}

/* 🎤 MIC */
.mic{
    width:140px;
    height:140px;
    border-radius:50%;
    background: radial-gradient(circle at 30% 30%, #2b2b2b, #000);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    position:relative;
    box-shadow: 0 0 20px rgba(255,255,255,0.1);
}

/* corpo mic */
.mic::before{
    content:"";
    width:40px;
    height:60px;
    background:#bbb;
    border-radius:20px;
    position:absolute;
}

/* base */
.mic::after{
    content:"";
    width:70px;
    height:10px;
    background:#bbb;
    position:absolute;
    bottom:35px;
    border-radius:10px;
}

/* ativo */
.mic.ativo{
    box-shadow: 0 0 40px #22c55e;
    transform: scale(1.08);
}

/* ondas */
.wave{
    position:absolute;
    border:2px solid #22c55e;
    border-radius:50%;
    opacity:0;
}

.wave1{ width:160px; height:160px; }
.wave2{ width:190px; height:190px; }
.wave3{ width:220px; height:220px; }

@keyframes waveAnim{
    0%{ transform:scale(0.8); opacity:0.6; }
    100%{ transform:scale(1.4); opacity:0; }
}

.mic.ativo .wave{
    animation: waveAnim 1.5s infinite;
}

.mic.ativo .wave1{ animation-delay:0s; }
.mic.ativo .wave2{ animation-delay:0.3s; }
.mic.ativo .wave3{ animation-delay:0.6s; }

/* STATUS */
#status{
    font-size:1.2rem;
    color:white;
    opacity:0.9;
}

/* LEGENDA */
#legenda{
    position:fixed;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    background: rgba(0,0,0,0.7);
    padding:15px 25px;
    border-radius:15px;
    color:#fff;
    font-size:1.2rem;
    max-width:80%;
    text-align:center;
    opacity:0;
    transition:0.3s;
    white-space: pre-line;
}

#legenda.show{ opacity:1; }

/* VLibras livre */
[vw],
[vw-access-button],
.vw-plugin-wrapper {
    pointer-events: auto !important;
}
</style>
</head>

<body>

<div class="container">
    <div id="mic" class="mic">

        <div class="wave wave1"></div>
        <div class="wave wave2"></div>
        <div class="wave wave3"></div>

    </div>

    <div id="status">Ativar microfone</div>
</div>

<div id="legenda"></div>

<!-- VLibras -->
<div vw class="enabled">
  <div vw-access-button class="active"></div>
  <div vw-plugin-wrapper>
    <div class="vw-plugin-top-wrapper"></div>
  </div>
</div>

<script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>

<script>
new window.VLibras.Widget('https://vlibras.gov.br/app');

/* 🔥 AUTO ATTEMPT (VERSÃO MAIS FORTE) */
function tentarAutoVLibras(){
    let tentativas = 0;

    const intervalo = setInterval(() => {
        const btn = document.querySelector('[vw-access-button]');

        if(btn){
            btn.click();
            clearInterval(intervalo);
        }

        tentativas++;
        if(tentativas > 10){
            clearInterval(intervalo);
        }

    }, 800);
}

window.addEventListener("load", () => {
    setTimeout(tentarAutoVLibras, 1000);
});

/* MICROFONE */
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();

recognition.lang = "pt-BR";
recognition.continuous = true;
recognition.interimResults = true;

let ativo = false;
let timeoutLegenda;

const mic = document.getElementById("mic");
const status = document.getElementById("status");

/* LIGA / DESLIGA */
mic.onclick = () => {
    if(!ativo){
        recognition.start();
        ativo = true;
        mic.classList.add("ativo");
        status.innerText = "Desligar microfone";
    } else {
        recognition.stop();
        ativo = false;
        mic.classList.remove("ativo");
        status.innerText = "Ativar microfone";
    }
};

/* VOZ → TEXTO */
recognition.onresult = (event) => {
    let textoFinal = "";
    let textoParcial = "";

    for(let i = event.resultIndex; i < event.results.length; i++){
        let transcript = event.results[i][0].transcript;

        if(event.results[i].isFinal){
            textoFinal += transcript + " ";
        } else {
            textoParcial += transcript;
        }
    }

    let texto = (textoFinal + textoParcial).trim();

    if(texto.length > 0){
        mostrarLegenda(texto);
    }
};

/* LEGENDA */
function mostrarLegenda(texto){
    const legenda = document.getElementById("legenda");

    if(texto.length > 60){
        let meio = Math.floor(texto.length / 2);
        let quebra = texto.lastIndexOf(" ", meio);
        if(quebra !== -1){
            texto = texto.slice(0, quebra) + "\n" + texto.slice(quebra + 1);
        }
    }

    legenda.innerText = texto;
    legenda.classList.add("show");

    clearTimeout(timeoutLegenda);
    timeoutLegenda = setTimeout(()=>{
        legenda.classList.remove("show");
    },3500);

    setTimeout(() => {
        legenda.click();
    },100);
}

/* REINÍCIO */
recognition.onend = () => {
    if(ativo){
        setTimeout(()=>{
            if(ativo) recognition.start();
        },200);
    }
};

/* ERROS */
recognition.onerror = (event) => {
    if(event.error === "not-allowed"){
        ativo = false;
        mic.classList.remove("ativo");
        status.innerText = "Ativar microfone";
    }
};
</script>

</body>
</html>
