<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Legenda por Voz</title>

<style>
body{
font-family: Arial;
background:#111;
color:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
}

#legenda{
font-size:40px;
background:black;
padding:25px;
border-radius:10px;
max-width:900px;
text-align:center;
}

button{
margin-top:30px;
padding:15px 40px;
font-size:20px;
cursor:pointer;
}
</style>
</head>

<body>

<h1>🎤 Legenda por Voz</h1>

<div id="legenda">Clique em iniciar e fale...</div>

<button id="start">Iniciar</button>

<script>

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if (!SpeechRecognition) {
document.getElementById("legenda").innerText = "Seu navegador não suporta reconhecimento de voz.";
}

const recognition = new SpeechRecognition();

recognition.lang = "pt-BR";
recognition.continuous = true;
recognition.interimResults = true;

document.getElementById("start").onclick = () => {
recognition.start();
}

recognition.onresult = (event) => {

let texto = "";

for (let i = event.resultIndex; i < event.results.length; i++) {
texto += event.results[i][0].transcript;
}

document.getElementById("legenda").innerText = texto;

}

recognition.onerror = (event)=>{
console.log(event.error);
}

</script>

</body>
</html>
