<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Assistente de Voz</title>
<style>
body {
  font-family: Arial;
  text-align: center;
  background: #111;
  color: white;
  padding: 40px;
}
button {
  padding: 15px 30px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}
#output {
  margin-top: 30px;
  font-size: 20px;
}
</style>
</head>
<body>

<h1>🎤 Assistente de Voz</h1>
<button onclick="startListening()">Falar</button>

<div id="output"></div>

<script>
const apiKey = "COLOQUE_SUA_API_KEY_AQUI";

function startListening() {
  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = "pt-BR";

  recognition.onresult = async function(event) {
    const text = event.results[0][0].transcript;
    document.getElementById("output").innerHTML = "Você disse: " + text + "<br>🤖 Pensando...";

    const response = await fetch("https://api.openai.com/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + apiKey
      },
      body: JSON.stringify({
        model: "gpt-4o-mini",
        messages: [
          { role: "system", content: "Você é um assistente útil." },
          { role: "user", content: text }
        ]
      })
    });

    const data = await response.json();
    const reply = data.choices[0].message.content;

    document.getElementById("output").innerHTML =
      "Você disse: " + text + "<br><br>🤖 Resposta: " + reply;

    speak(reply);
  };

  recognition.start();
}

function speak(text) {
  const speech = new SpeechSynthesisUtterance(text);
  speech.lang = "pt-BR";
  window.speechSynthesis.speak(speech);
}
</script>

</body>
</html>
