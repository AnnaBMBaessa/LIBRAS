<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Tradutor Voz → Libras</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

/* 🎨 FUNDO DO PRIMEIRO CÓDIGO */
body{
    background: linear-gradient(135deg, #0f172a, #1e3a8a);
    color: #fff;
    font-family: 'Roboto', Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    text-align: center;
}

h1{
    font-size: 3rem;
    margin-bottom: 10px;
}

p{
    margin-bottom: 30px;
}

/* 🎤 BOTÃO COM ESTADO */
button{
    margin-top: 20px;
    padding: 18px 50px;
    font-size: 1.2rem;
    border: none;
    border-radius: 30px;
    background: #111;
    color: #fff;
    cursor: pointer;
    transition: 0.3s;
}

/* ESTADO ATIVO (igual ideia do primeiro código) */
button.ativo{
    box-shadow: 0 0 25px #22c55e;
    transform: scale(1.05);
}

#legenda{
    position: fixed;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    padding: 18px 35px;
    border-radius: 20px;
    font-size: 1.3rem;
    max-width: 75%;
    text-align: center;
    opacity: 0;
    transition: 0.3s;
    white-space: pre-line;
}

#legenda.show{
    opacity: 1;
}
</style>
</head>

<body>

<h1>🎤 Voz para Libras</h1>
<p>Clique para ligar ou desligar o microfone</p>

<button id="btn">Ativar Microfone</button>

<div id="legenda"></div>

<!-- VLibras -->
<div vw class="enabled">
  <div vw-access-button class="active"></div>
  <div vw-plugin-wrapper>
    <div class="vw-plugin-top-wrapper"></div>
  </div>
</div>

<script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>

<script>
new window.VLibras.Widget('https://vlibras.gov.br/app');

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();

recognition.lang = "pt-BR";
recognition.continuous = true;
recognition.interimResults = true;

let ativo = false;
let timeoutLegenda;

const btn = document.getElementById("btn");

// 🎤 LIGA / DESLIGA
btn.onclick = () => {
    if(!ativo){
        recognition.start();
        ativo = true;
        btn.innerText = "Desligar Microfone";
        btn.classList.add("ativo");
    } else {
        recognition.stop();
        ativo = false;
        btn.innerText = "Ativar Microfone";
        btn.classList.remove("ativo");
    }
};

recognition.onresult = (event) => {
    let textoFinal = "";
    let textoParcial = "";

    for(let i = event.resultIndex; i < event.results.length; i++){
        let transcript = event.results[i][0].transcript;

        if(event.results[i].isFinal){
            textoFinal += transcript + " ";
        } else {
            textoParcial += transcript;
        }
    }

    let texto = (textoFinal + textoParcial).trim();

    if(texto.length > 0){
        mostrarLegenda(texto);
    }
};

function mostrarLegenda(texto){
    const legenda = document.getElementById("legenda");

    // 🔥 quebra de linha mantida do segundo código
    if(texto.length > 60){
        let meio = Math.floor(texto.length / 2);
        let quebra = texto.lastIndexOf(" ", meio);
        if(quebra !== -1){
            texto = texto.slice(0, quebra) + "\n" + texto.slice(quebra + 1);
        }
    }

    legenda.innerText = texto;
    legenda.classList.add("show");

    clearTimeout(timeoutLegenda);
    timeoutLegenda = setTimeout(()=>{
        legenda.classList.remove("show");
    },3500);

    legenda.click();
}

// 🔁 reinício controlado (melhorado)
recognition.onend = () => {
    if(ativo){
        setTimeout(() => {
            if(ativo) recognition.start();
        },200);
    }
};

recognition.onerror = (event) => {
    console.error(event.error);

    if(event.error === "not-allowed"){
        alert("Permissão do microfone negada!");
        ativo = false;
        btn.innerText = "Ativar Microfone";
        btn.classList.remove("ativo");
    }
};
</script>

</body>
</html>
