<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tradutor Voz → Libras</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            color: white;
            overflow: hidden;
        }

        /* LADO ESQUERDO - CONTROLES */
        .left {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-right: 1px solid rgba(255,255,255,0.1);
        }

        .mic-container {
            text-align: center;
        }

        .mic {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
            border: 4px solid transparent;
        }

        .mic.ativo {
            box-shadow: 0 0 50px #22c55e;
            transform: scale(1.1);
            border-color: #22c55e;
            background: #064e3b;
        }

        .mic img {
            width: 70px;
            filter: invert(1);
        }

        .status {
            margin-top: 30px;
            font-size: 1.4rem;
            font-weight: 400;
            letter-spacing: 1px;
            color: #94a3b8;
        }

        .status.on {
            color: #22c55e;
            font-weight: bold;
        }

        /* LADO DIREITO - AVATAR */
        .right {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.2);
        }

        .box {
            width: 400px;
            height: 450px;
            border: 3px dashed #fbbf24;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: rgba(255,255,255,0.05);
        }

        /* LEGENDA DINÂMICA */
        #legenda {
            position: absolute;
            bottom: -100px;
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 15px 25px;
            border-radius: 15px;
            width: 90%;
            text-align: center;
            font-size: 1.2rem;
            min-height: 50px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
            border-left: 5px solid #fbbf24;
            backdrop-filter: blur(5px);
            pointer-events: none;
        }

        #legenda.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* CUSTOMIZAÇÃO VLIBRAS PARA CABER NO BOX */
        .vw-plugin-wrapper {
            position: relative !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            width: 100% !important;
            height: 100% !important;
            top: 0 !important;
            left: 0 !important;
            right: 0 !important;
            bottom: 0 !important;
        }

        [vw-access-button] {
            display: none !important; /* Esconde o botão flutuante para focar no box */
        }
    </style>
</head>

<body>

<div class="left">
    <div class="mic-container">
        <div id="mic" class="mic">
            <img src="https://cdn-icons-png.flaticon.com/512/61/61088.png" alt="Microfone">
        </div>
        <div id="status" class="status">Clique para iniciar</div>
    </div>
</div>

<div class="right">
    <div class="box">
        <div vw class="enabled">
            <div vw-access-button class="active"></div>
            <div vw-plugin-wrapper>
                <div class="vw-plugin-top-wrapper"></div>
            </div>
        </div>
        
        <div id="legenda"></div>
    </div>
</div>

<script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>

<script>
    // Inicializa o Widget do VLibras
    new window.VLibras.Widget('https://vlibras.gov.br/app');

    // Configuração do Reconhecimento de Voz
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    
    if (!SpeechRecognition) {
        alert("Seu navegador não suporta reconhecimento de voz. Tente o Google Chrome.");
    }

    const recognition = new SpeechRecognition();
    recognition.lang = "pt-BR";
    recognition.continuous = true;
    recognition.interimResults = true;

    let ativo = false;
    let timeoutLegenda;

    const micBtn = document.getElementById("mic");
    const statusTxt = document.getElementById("status");
    const legendaBox = document.getElementById("legenda");

    // LÓGICA DE ATIVAÇÃO
    micBtn.onclick = () => {
        if (!ativo) {
            iniciar();
        } else {
            parar();
        }
    };

    function iniciar() {
        recognition.start();
        ativo = true;
        statusTxt.innerText = "Ouvindo...";
        statusTxt.classList.add("on");
        micBtn.classList.add("ativo");
    }

    function parar() {
        recognition.stop();
        ativo = false;
        statusTxt.innerText = "Microfone desligado";
        statusTxt.classList.remove("on");
        micBtn.classList.remove("ativo");
    }

    // PROCESSAMENTO DA VOZ
    recognition.onresult = (event) => {
        let textoFinal = "";
        let textoParcial = "";

        for (let i = event.resultIndex; i < event.results.length; i++) {
            let transcript = event.results[i][0].transcript;
            if (event.results[i].isFinal) {
                textoFinal += transcript + " ";
            } else {
                textoParcial += transcript;
            }
        }

        let textoCompleto = (textoFinal + textoParcial).trim();

        if (textoCompleto.length > 0) {
            atualizarInterface(textoCompleto);
        }
    };

    function atualizarInterface(texto) {
        // Exibe a legenda na tela
        legendaBox.innerText = texto;
        legendaBox.classList.add("show");

        // Reseta o tempo para sumir a legenda
        clearTimeout(timeoutLegenda);
        timeoutLegenda = setTimeout(() => {
            legendaBox.classList.remove("show");
        }, 5000);

        // 🔥 ENVIAR PARA O VLIBRAS
        // O VLibras captura o texto clicando no elemento ou via API interna
        // Forçamos o clique para disparar a tradução do texto atualizado
        legendaBox.click();
    }

    // Manter o microfone ligado se a sessão cair (comum em pausas longas)
    recognition.onend = () => {
        if (ativo) {
            recognition.start();
        }
    };

    recognition.onerror = (event) => {
        console.error("Erro no Reconhecimento:", event.error);
        if (event.error === 'no-speech') return;
        parar();
    };
</script>

</body>
</html>
