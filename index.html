<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Voz → Libras</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e3a8a);
}

/* CONTAINER */
.container{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:15px;
}

/* 🎤 MIC PREMIUM */
.mic{
    width:160px;
    height:160px;
    border-radius:50%;
    cursor:pointer;
    position:relative;

    /* base escura metálica */
    background: radial-gradient(circle at 30% 30%, #2a2a2a, #0a0a0a);

    /* brilho externo dourado suave */
    box-shadow:
        0 0 0 3px rgba(212,175,55,0.35),
        0 0 25px rgba(0,0,0,0.6),
        inset 0 0 20px rgba(255,255,255,0.05);

    display:flex;
    align-items:center;
    justify-content:center;

    transition:0.3s;
}

/* efeito interno dourado */
.mic::before{
    content:"";
    position:absolute;
    width:70px;
    height:90px;
    border-radius:25px;

    background: linear-gradient(180deg, #d4af37, #8a6d1f);

    box-shadow:
        inset 0 2px 5px rgba(255,255,255,0.3),
        inset 0 -3px 8px rgba(0,0,0,0.4);

    z-index:1;
}

/* base do microfone */
.mic::after{
    content:"";
    position:absolute;
    bottom:38px;
    width:90px;
    height:12px;
    border-radius:10px;

    background: linear-gradient(90deg, #d4af37, #b8860b);

    box-shadow: 0 2px 6px rgba(0,0,0,0.5);
}

/* hover */
.mic:hover{
    transform: scale(1.05);
}

/* ativo */
.mic.ativo{
    box-shadow:
        0 0 0 3px rgba(212,175,55,0.6),
        0 0 40px rgba(212,175,55,0.35),
        inset 0 0 20px rgba(255,255,255,0.08);
    transform: scale(1.08);
}

/* STATUS */
#status{
    font-size:1.3rem;
    color:white;
    font-weight:500;
    letter-spacing:0.5px;
    opacity:0.9;
    text-align:center;
}

/* LEGENDA */
#legenda{
    position:fixed;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    background: rgba(0,0,0,0.7);
    padding:15px 25px;
    border-radius:15px;
    color:#fff;
    font-size:1.2rem;
    max-width:80%;
    text-align:center;
    opacity:0;
    transition:0.3s;
    white-space: pre-line;
}

#legenda.show{
    opacity:1;
}

/* VLibras */
[vw],
[vw-access-button],
.vw-plugin-wrapper {
    pointer-events: auto !important;
}
</style>
</head>

<body>

<div class="container">

    <div id="mic" class="mic"></div>

    <div id="status">Ativar microfone</div>

</div>

<div id="legenda"></div>

<!-- VLibras -->
<div vw class="enabled">
  <div vw-access-button class="active"></div>
  <div vw-plugin-wrapper>
    <div class="vw-plugin-top-wrapper"></div>
  </div>
</div>

<script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>

<script>
new window.VLibras.Widget('https://vlibras.gov.br/app');

window.addEventListener("load", () => {
    setTimeout(() => {
        const btn = document.querySelector('[vw-access-button]');
        if(btn) btn.click();
    }, 1200);
});

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();

recognition.lang = "pt-BR";
recognition.continuous = true;
recognition.interimResults = true;

let ativo = false;
let timeoutLegenda;

const mic = document.getElementById("mic");
const status = document.getElementById("status");

/* LIGA / DESLIGA */
mic.onclick = () => {
    if(!ativo){
        recognition.start();
        ativo = true;
        mic.classList.add("ativo");
        status.innerText = "Desativar microfone";
    } else {
        recognition.stop();
        ativo = false;
        mic.classList.remove("ativo");
        status.innerText = "Ativar microfone";
    }
};

/* VOZ → TEXTO */
recognition.onresult = (event) => {
    let textoFinal = "";
    let textoParcial = "";

    for(let i = event.resultIndex; i < event.results.length; i++){
        let transcript = event.results[i][0].transcript;

        if(event.results[i].isFinal){
            textoFinal += transcript + " ";
        } else {
            textoParcial += transcript;
        }
    }

    let texto = (textoFinal + textoParcial).trim();

    if(texto.length > 0){
        mostrarLegenda(texto);
    }
};

/* LEGENDA */
function mostrarLegenda(texto){
    const legenda = document.getElementById("legenda");

    if(texto.length > 60){
        let meio = Math.floor(texto.length / 2);
        let quebra = texto.lastIndexOf(" ", meio);
        if(quebra !== -1){
            texto = texto.slice(0, quebra) + "\n" + texto.slice(quebra + 1);
        }
    }

    legenda.innerText = texto;
    legenda.classList.add("show");

    clearTimeout(timeoutLegenda);
    timeoutLegenda = setTimeout(()=>{
        legenda.classList.remove("show");
    },3500);

    setTimeout(() => {
        legenda.click();
    },100);
};

/* REINÍCIO */
recognition.onend = () => {
    if(ativo){
        setTimeout(()=>{
            recognition.start();
        },200);
    }
};
</script>

</body>
</html>
