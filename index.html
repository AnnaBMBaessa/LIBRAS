<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Tradutor Voz → Libras</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body{
    background: radial-gradient(circle at 20% 30%, #1e3a8a, #0b1a3a 40%, #020617 80%);
    color: #fff;
    font-family: 'Roboto', Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    text-align: center;
    overflow: hidden;
}

h1{
    font-size: 3rem;
    font-weight: 700;
    margin-bottom: 10px;
    text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
}

p{
    font-size: 1.25rem;
    margin-bottom: 40px;
    color: rgba(255,255,255,0.85);
}

/* BOTÃO MICROFONE (ÍCONE DOURADO REALISTA EM CSS) */
#start{
    width: 130px;
    height: 130px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    background: radial-gradient(circle at 30% 30%, #ffd700, #b8860b 60%, #7a5a00);
    box-shadow:
        inset 0 4px 10px rgba(255,255,255,0.35),
        inset 0 -6px 10px rgba(0,0,0,0.4),
        0 10px 25px rgba(0,0,0,0.4);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.3s;
}

/* corpo do microfone */
#start::before{
    content: "";
    position: absolute;
    width: 40px;
    height: 55px;
    border-radius: 25px;
    background: linear-gradient(to bottom, #ffe680, #b8860b);
    top: 28px;
    box-shadow: inset 0 -3px 6px rgba(0,0,0,0.3);
}

/* base do microfone */
#start::after{
    content: "";
    position: absolute;
    width: 55px;
    height: 18px;
    bottom: 40px;
    border-radius: 10px;
    background: linear-gradient(to bottom, #ffd700, #8b6508);
}

/* brilho */
#start span{
    position: absolute;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: rgba(255,255,255,0.6);
    top: 25px;
    left: 35px;
    filter: blur(1px);
}

#start:hover{
    transform: scale(1.08);
    box-shadow:
        inset 0 4px 10px rgba(255,255,255,0.45),
        inset 0 -6px 10px rgba(0,0,0,0.5),
        0 15px 30px rgba(0,0,0,0.5);
}

#legenda{
    position: fixed;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    padding: 18px 35px;
    border-radius: 20px;
    font-size: 1.3rem;
    max-width: 75%;
    text-align: center;
    line-height: 1.5;
    opacity: 0;
    transition: opacity 0.3s ease;
    backdrop-filter: blur(8px);
    white-space: pre-line;
}

#legenda.show{
    opacity: 1;
}

/* resto (VLibras + modal mantido simples) */
.vw-plugin-wrapper {
    bottom: 20px !important;
    right: 20px !important;
}
</style>
</head>

<body>

<h1>🎤 Voz para Libras Automático</h1>
<p>Fale normalmente e veja a tradução em Libras</p>

<!-- BOTÃO MICROFONE VISUAL -->
<button id="start">
    <span></span>
</button>

<div id="legenda"></div>

<!-- VLibras -->
<div vw class="enabled">
  <div vw-access-button class="active"></div>
  <div vw-plugin-wrapper>
    <div class="vw-plugin-top-wrapper"></div>
  </div>
</div>

<script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>

<script>
new window.VLibras.Widget('https://vlibras.gov.br/app');

/* SPEECH */
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();

recognition.lang = "pt-BR";
recognition.continuous = true;
recognition.interimResults = true;

let timeoutLegenda;

document.getElementById("start").onclick = () => {
    recognition.start();
};

recognition.onresult = (event) => {
    let textoFinal = "";
    let textoParcial = "";

    for(let i = event.resultIndex; i < event.results.length; i++){
        let transcript = event.results[i][0].transcript;

        if(event.results[i].isFinal){
            textoFinal += transcript + " ";
        } else {
            textoParcial += transcript;
        }
    }

    let texto = (textoFinal + textoParcial).trim();

    if(texto.length > 0){
        mostrarLegenda(texto);
    }
};

function mostrarLegenda(texto){
    const legenda = document.getElementById("legenda");

    if(texto.length > 60){
        let meio = Math.floor(texto.length / 2);
        let quebra = texto.lastIndexOf(" ", meio);
        if(quebra !== -1){
            texto = texto.slice(0, quebra) + "\n" + texto.slice(quebra + 1);
        }
    }

    legenda.innerText = texto;
    legenda.classList.add("show");

    clearTimeout(timeoutLegenda);
    timeoutLegenda = setTimeout(()=>{
        legenda.classList.remove("show");
    },3500);
}

recognition.onend = () => {
    recognition.start(); 
};
</script>

</body>
</html>
